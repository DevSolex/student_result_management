<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students - Lecturer Result Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../src/output.css">
    <style>
        .sidebar-transition {
            transition: transform 0.3s ease-in-out;
        }
        
        .card-hover {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Sidebar -->
    <div id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-white shadow-lg transform -translate-x-full sidebar-transition lg:translate-x-0 lg:static lg:inset-0">
        <div class="flex items-center justify-center h-16 px-4 bg-gradient-to-r from-green-600 to-teal-600">
            <h1 class="text-xl font-bold text-white">Lecturer Portal</h1>
        </div>
        
        <nav class="mt-8">
            <div class="px-4 space-y-2">
                <a href="dashboard.html" class="flex items-center px-4 py-2 text-sm font-medium rounded-lg text-gray-700 hover:bg-gray-50">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                    </svg>
                    Dashboard
                </a>
                <a href="students.html" class="flex items-center px-4 py-2 text-sm font-medium rounded-lg bg-green-50 text-green-700">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
                    </svg>
                    Students
                </a>
                <a href="submit-result.html" class="flex items-center px-4 py-2 text-sm font-medium rounded-lg text-gray-700 hover:bg-gray-50">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                    </svg>
                    Submit Result
                </a>
                <a href="bulk-upload.html" class="flex items-center px-4 py-2 text-sm font-medium rounded-lg text-gray-700 hover:bg-gray-50">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                    </svg>
                    Bulk Upload
                </a>
            </div>
        </nav>
        
        <!-- User Profile -->
        <div class="absolute bottom-0 left-0 right-0 p-4 border-t">
            <div class="flex items-center">
                <div class="flex-shrink-0">
                    <div class="w-8 h-8 bg-gradient-to-r from-green-600 to-teal-600 rounded-full flex items-center justify-center">
                        <span class="text-white text-sm font-medium" id="user-initials">L</span>
                    </div>
                </div>
                <div class="ml-3">
                    <p class="text-sm font-medium text-gray-700" id="user-name">Lecturer</p>
                    <p class="text-xs text-gray-500" id="user-email">lecturer@example.com</p>
                </div>
            </div>
            <button onclick="auth.logout()" class="mt-3 w-full flex items-center justify-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-red-600 hover:bg-red-700">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                </svg>
                Logout
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="lg:pl-64">
        <!-- Header -->
        <header class="bg-white shadow-sm border-b">
            <div class="flex items-center justify-between px-4 py-4">
                <div class="flex items-center">
                    <button id="menu-toggle" class="lg:hidden p-2 rounded-md text-gray-400 hover:text-gray-500 hover:bg-gray-100">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                    <h1 class="ml-4 text-2xl font-semibold text-gray-900">Students</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <button onclick="exportStudents()" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 flex items-center">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                        Export
                    </button>
                </div>
            </div>
        </header>

        <!-- Students Content -->
        <main class="p-4 lg:p-8">
            <!-- Search and Filters -->
            <div class="bg-white rounded-lg shadow p-6 mb-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Search Students</label>
                        <div class="relative">
                            <input type="text" id="search-input" placeholder="Search by name, email, or matric number" 
                                   class="w-full px-3 py-2 pl-10 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                                </svg>
                            </div>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Course</label>
                        <select id="course-filter" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                            <option value="">All Courses</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Level</label>
                        <select id="level-filter" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                            <option value="">All Levels</option>
                            <option value="100">100 Level</option>
                            <option value="200">200 Level</option>
                            <option value="300">300 Level</option>
                            <option value="400">400 Level</option>
                        </select>
                    </div>
                </div>
                <div class="mt-4 flex justify-end">
                    <button onclick="applyFilters()" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">
                        Apply Filters
                    </button>
                    <button onclick="resetFilters()" class="ml-2 px-4 py-2 bg-gray-300 text-gray-700 rounded-lg hover:bg-gray-400">
                        Reset
                    </button>
                </div>
            </div>

            <!-- Students Table -->
            <div class="bg-white rounded-lg shadow overflow-hidden">
                <div class="px-6 py-4 border-b">
                    <h3 class="text-lg font-medium text-gray-900">Student List</h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Student</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Matric Number</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Level</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Courses</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">GPA</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="students-table-body" class="bg-white divide-y divide-gray-200">
                            <!-- Students will be loaded here -->
                        </tbody>
                    </table>
                </div>
                
                <!-- Empty State -->
                <div id="empty-state" class="hidden text-center py-12">
                    <svg class="w-12 h-12 mx-auto text-gray-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
                    </svg>
                    <p class="text-gray-500">No students found</p>
                </div>
            </div>

            <!-- Student Details Modal -->
            <div id="student-modal" class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50">
                <div class="relative top-20 mx-auto p-5 border w-11/12 max-w-4xl shadow-lg rounded-lg bg-white">
                    <div class="mt-3">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-lg font-medium text-gray-900">Student Details</h3>
                            <button onclick="closeStudentModal()" class="text-gray-400 hover:text-gray-500">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                                </svg>
                            </button>
                        </div>
                        <div id="student-details-content">
                            <!-- Student details will be loaded here -->
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        // Check authentication
        document.addEventListener('DOMContentLoaded', () => {
            if (!auth.isAuthenticated()) {
                window.location.href = '../login.html';
                return;
            }

            if (!auth.hasRole('lecturer')) {
                auth.redirectByRole();
                return;
            }

            // Initialize students page
            initializeStudents();
        });

        // Initialize students page
        async function initializeStudents() {
            try {
                // Load user data
                const user = auth.getCurrentUser();
                updateUserProfile(user);

                // Load students data
                await loadStudents();

                // Setup mobile menu
                setupMobileMenu();
            } catch (error) {
                console.error('Students initialization error:', error);
                toastManager.error('Failed to load students');
            }
        }

        // Update user profile
        function updateUserProfile(user) {
            const userName = user.name || user.email || 'Lecturer';
            const initials = userName.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);

            document.getElementById('user-name').textContent = userName;
            document.getElementById('user-email').textContent = user.email;
            document.getElementById('user-initials').textContent = initials;
        }

        // Load students data
        async function loadStudents() {
            try {
                showLoading();

                const studentsData = await api.get('/lecturers/me/students');
                
                // Update table
                updateStudentsTable(studentsData);
                
                // Populate filters
                populateFilters(studentsData);

            } catch (error) {
                console.error('Error loading students:', error);
                toastManager.error('Failed to load students');
            } finally {
                hideLoading();
            }
        }

        // Update students table
        function updateStudentsTable(students) {
            const tbody = document.getElementById('students-table-body');
            const emptyState = document.getElementById('empty-state');
            
            if (!students || students.length === 0) {
                tbody.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');
            
            tbody.innerHTML = students.map(student => `
                <tr>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="flex items-center">
                            <div class="flex-shrink-0 h-10 w-10">
                                <div class="h-10 w-10 rounded-full bg-gradient-to-r from-blue-500 to-purple-600 flex items-center justify-center">
                                    <span class="text-white text-sm font-medium">${getInitials(student.name)}</span>
                                </div>
                            </div>
                            <div class="ml-4">
                                <div class="text-sm font-medium text-gray-900">${student.name}</div>
                                <div class="text-sm text-gray-500">${student.department}</div>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${student.matric_number}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${student.email}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${student.level}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${student.courses_count || 0}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${formatGPA(student.gpa || 0)}</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${getStatusColor(student.status)}">
                            ${student.status || 'Active'}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                        <button onclick="viewStudentDetails('${student.id}')" class="text-green-600 hover:text-green-900 mr-3">View</button>
                        <button onclick="submitResult('${student.id}')" class="text-blue-600 hover:text-blue-900 mr-3">Result</button>
                        <button onclick="viewResults('${student.id}')" class="text-purple-600 hover:text-purple-900">History</button>
                    </td>
                </tr>
            `).join('');
        }

        // Populate filters
        function populateFilters(students) {
            if (!students || students.length === 0) return;

            // Get unique courses
            const courses = [...new Set(students.flatMap(s => s.courses || []))].sort();
            const courseFilter = document.getElementById('course-filter');
            
            courseFilter.innerHTML = '<option value="">All Courses</option>' + 
                courses.map(c => `<option value="${c}">${c}</option>`).join('');
        }

        // Get initials
        function getInitials(name) {
            return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
        }

        // Get status color
        function getStatusColor(status) {
            const colors = {
                'Active': 'bg-green-100 text-green-800',
                'Inactive': 'bg-red-100 text-red-800',
                'Suspended': 'bg-yellow-100 text-yellow-800'
            };
            return colors[status] || 'bg-gray-100 text-gray-800';
        }

        // Apply filters
        function applyFilters() {
            const search = document.getElementById('search-input').value;
            const course = document.getElementById('course-filter').value;
            const level = document.getElementById('level-filter').value;
            
            loadFilteredStudents(search, course, level);
        }

        // Load filtered students
        async function loadFilteredStudents(search, course, level) {
            try {
                showLoading();
                
                const queryParams = new URLSearchParams();
                if (search) queryParams.append('search', search);
                if (course) queryParams.append('course', course);
                if (level) queryParams.append('level', level);
                
                const url = queryParams.toString() ? `/lecturers/me/students?${queryParams}` : '/lecturers/me/students';
                const studentsData = await api.get(url);
                
                updateStudentsTable(studentsData);
                
            } catch (error) {
                console.error('Error loading filtered students:', error);
                toastManager.error('Failed to load filtered students');
            } finally {
                hideLoading();
            }
        }

        // Reset filters
        function resetFilters() {
            document.getElementById('search-input').value = '';
            document.getElementById('course-filter').value = '';
            document.getElementById('level-filter').value = '';
            
            loadStudents();
        }

        // View student details
        async function viewStudentDetails(studentId) {
            try {
                showLoading();
                
                const studentData = await api.get(`/lecturers/me/students/${studentId}`);
                
                // Update modal content
                const content = document.getElementById('student-details-content');
                content.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <h4 class="text-lg font-medium text-gray-900 mb-4">Personal Information</h4>
                            <div class="space-y-2">
                                <div class="flex">
                                    <span class="w-32 text-sm font-medium text-gray-600">Name:</span>
                                    <span class="text-sm text-gray-900">${studentData.name}</span>
                                </div>
                                <div class="flex">
                                    <span class="w-32 text-sm font-medium text-gray-600">Matric Number:</span>
                                    <span class="text-sm text-gray-900">${studentData.matric_number}</span>
                                </div>
                                <div class="flex">
                                    <span class="w-32 text-sm font-medium text-gray-600">Email:</span>
                                    <span class="text-sm text-gray-900">${studentData.email}</span>
                                </div>
                                <div class="flex">
                                    <span class="w-32 text-sm font-medium text-gray-600">Phone:</span>
                                    <span class="text-sm text-gray-900">${studentData.phone_number || '-'}</span>
                                </div>
                                <div class="flex">
                                    <span class="w-32 text-sm font-medium text-gray-600">Department:</span>
                                    <span class="text-sm text-gray-900">${studentData.department}</span>
                                </div>
                                <div class="flex">
                                    <span class="w-32 text-sm font-medium text-gray-600">Level:</span>
                                    <span class="text-sm text-gray-900">${studentData.level}</span>
                                </div>
                            </div>
                        </div>
                        
                        <div>
                            <h4 class="text-lg font-medium text-gray-900 mb-4">Academic Information</h4>
                            <div class="space-y-2">
                                <div class="flex">
                                    <span class="w-32 text-sm font-medium text-gray-600">Current GPA:</span>
                                    <span class="text-sm text-gray-900">${formatGPA(studentData.gpa || 0)}</span>
                                </div>
                                <div class="flex">
                                    <span class="w-32 text-sm font-medium text-gray-600">Total Credits:</span>
                                    <span class="text-sm text-gray-900">${studentData.total_credits || 0}</span>
                                </div>
                                <div class="flex">
                                    <span class="w-32 text-sm font-medium text-gray-600">Courses:</span>
                                    <span class="text-sm text-gray-900">${studentData.courses_count || 0}</span>
                                </div>
                                <div class="flex">
                                    <span class="w-32 text-sm font-medium text-gray-600">Status:</span>
                                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${getStatusColor(studentData.status)}">
                                        ${studentData.status || 'Active'}
                                    </span>
                                </div>
                                <div class="flex">
                                    <span class="w-32 text-sm font-medium text-gray-600">Admission Date:</span>
                                    <span class="text-sm text-gray-900">${formatDate(studentData.admission_date)}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-6">
                        <h4 class="text-lg font-medium text-gray-900 mb-4">Recent Results</h4>
                        <div class="overflow-x-auto">
                            <table class="min-w-full divide-y divide-gray-200">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Course</th>
                                        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Grade</th>
                                        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Credits</th>
                                        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Date</th>
                                    </tr>
                                </thead>
                                <tbody class="bg-white divide-y divide-gray-200">
                                    ${(studentData.recent_results || []).map(result => `
                                        <tr>
                                            <td class="px-4 py-2 text-sm text-gray-900">${result.course_code}</td>
                                            <td class="px-4 py-2 text-sm text-gray-900">${result.grade}</td>
                                            <td class="px-4 py-2 text-sm text-gray-900">${result.credits}</td>
                                            <td class="px-4 py-2 text-sm text-gray-900">${formatDate(result.created_at)}</td>
                                        </tr>
                                    `).join('') || '<tr><td colspan="4" class="px-4 py-2 text-center text-gray-500">No results available</td></tr>'}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
                
                // Show modal
                document.getElementById('student-modal').classList.remove('hidden');
                
            } catch (error) {
                console.error('Error loading student details:', error);
                toastManager.error('Failed to load student details');
            } finally {
                hideLoading();
            }
        }

        // Close student modal
        function closeStudentModal() {
            document.getElementById('student-modal').classList.add('hidden');
        }

        // Submit result for student
        function submitResult(studentId) {
            // Redirect to submit result page with student ID
            window.location.href = `submit-result.html?student=${studentId}`;
        }

        // View student results
        function viewResults(studentId) {
            // Redirect to results page for this student
            window.location.href = `student-results.html?id=${studentId}`;
        }

        // Export students
        function exportStudents() {
            toastManager.info('Export functionality will be implemented soon');
        }

        // Setup mobile menu
        function setupMobileMenu() {
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            
            menuToggle.addEventListener('click', () => {
                sidebar.classList.toggle('-translate-x-full');
            });
            
            // Close menu when clicking outside
            document.addEventListener('click', (e) => {
                if (!sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
                    sidebar.classList.add('-translate-x-full');
                }
            });
        }
    </script>
</body>
</html>
