<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Connection Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 4px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        .info { background-color: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <h1>API Connection Test</h1>
    <button onclick="testAPI()">Test API Connection</button>
    <div id="results"></div>

    <script>
        async function testAPI() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            // Test different ports and endpoints
            const tests = [
                { url: 'http://localhost:8000/api/v1', name: 'Port 8000' },
                { url: 'http://localhost:8001/api/v1', name: 'Port 8001' },
                { url: 'http://127.0.0.1:8000/api/v1', name: '127.0.0.1:8000' },
                { url: 'http://127.0.0.1:8001/api/v1', name: '127.0.0.1:8001' }
            ];

            for (const test of tests) {
                try {
                    const response = await fetch(test.url);
                    const result = document.createElement('div');
                    result.className = 'test-result success';
                    result.innerHTML = `<strong>${test.name}</strong>: SUCCESS - Status: ${response.status}`;
                    resultsDiv.appendChild(result);
                } catch (error) {
                    const result = document.createElement('div');
                    result.className = 'test-result error';
                    result.innerHTML = `<strong>${test.name}</strong>: FAILED - ${error.message}`;
                    resultsDiv.appendChild(result);
                }
            }

            // Test browser info
            const browserInfo = document.createElement('div');
            browserInfo.className = 'test-result info';
            browserInfo.innerHTML = `
                <strong>Browser Info:</strong><br>
                User Agent: ${navigator.userAgent}<br>
                Current URL: ${window.location.href}
            `;
            resultsDiv.appendChild(browserInfo);
        }
    </script>
</body>
</html>
