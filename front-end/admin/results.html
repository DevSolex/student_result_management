<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results Management - Admin Result Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../src/output.css">
    <style>
        .sidebar-transition {
            transition: transform 0.3s ease-in-out;
        }
        
        .card-hover {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Sidebar -->
    <div id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-white shadow-lg transform -translate-x-full sidebar-transition lg:translate-x-0 lg:static lg:inset-0">
        <div class="flex items-center justify-center h-16 px-4 bg-gradient-to-r from-red-600 to-orange-600">
            <h1 class="text-xl font-bold text-white">Admin Portal</h1>
        </div>
        
        <nav class="mt-8">
            <div class="px-4 space-y-2">
                <a href="dashboard.html" class="flex items-center px-4 py-2 text-sm font-medium rounded-lg text-gray-700 hover:bg-gray-50">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                    </svg>
                    Dashboard
                </a>
                <a href="results.html" class="flex items-center px-4 py-2 text-sm font-medium rounded-lg bg-red-50 text-red-700">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                    </svg>
                    Results
                </a>
                <a href="students.html" class="flex items-center px-4 py-2 text-sm font-medium rounded-lg text-gray-700 hover:bg-gray-50">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
                    </svg>
                    Students
                </a>
                <a href="lecturers.html" class="flex items-center px-4 py-2 text-sm font-medium rounded-lg text-gray-700 hover:bg-gray-50">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                    Lecturers
                </a>
                <a href="pre-registered.html" class="flex items-center px-4 py-2 text-sm font-medium rounded-lg text-gray-700 hover:bg-gray-50">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path>
                    </svg>
                    Pre-registered
                </a>
            </div>
        </nav>
        
        <!-- User Profile -->
        <div class="absolute bottom-0 left-0 right-0 p-4 border-t">
            <div class="flex items-center">
                <div class="flex-shrink-0">
                    <div class="w-8 h-8 bg-gradient-to-r from-red-600 to-orange-600 rounded-full flex items-center justify-center">
                        <span class="text-white text-sm font-medium" id="user-initials">A</span>
                    </div>
                </div>
                <div class="ml-3">
                    <p class="text-sm font-medium text-gray-700" id="user-name">Administrator</p>
                    <p class="text-xs text-gray-500" id="user-email">admin@example.com</p>
                </div>
            </div>
            <button onclick="auth.logout()" class="mt-3 w-full flex items-center justify-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-red-600 hover:bg-red-700">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                </svg>
                Logout
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="lg:pl-64">
        <!-- Header -->
        <header class="bg-white shadow-sm border-b">
            <div class="flex items-center justify-between px-4 py-4">
                <div class="flex items-center">
                    <button id="menu-toggle" class="lg:hidden p-2 rounded-md text-gray-400 hover:text-gray-500 hover:bg-gray-100">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                    <h1 class="ml-4 text-2xl font-semibold text-gray-900">Results Management</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <button onclick="exportResults()" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 flex items-center">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                        Export
                    </button>
                </div>
            </div>
        </header>

        <!-- Results Content -->
        <main class="p-4 lg:p-8">
            <!-- Filters -->
            <div class="bg-white rounded-lg shadow p-6 mb-6">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Status</label>
                        <select id="status-filter" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500">
                            <option value="">All Status</option>
                            <option value="pending">Pending</option>
                            <option value="approved">Approved</option>
                            <option value="rejected">Rejected</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Course</label>
                        <select id="course-filter" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500">
                            <option value="">All Courses</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Lecturer</label>
                        <select id="lecturer-filter" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500">
                            <option value="">All Lecturers</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Date Range</label>
                        <input type="date" id="date-filter" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500">
                    </div>
                </div>
                <div class="mt-4 flex justify-end">
                    <button onclick="applyFilters()" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">
                        Apply Filters
                    </button>
                    <button onclick="resetFilters()" class="ml-2 px-4 py-2 bg-gray-300 text-gray-700 rounded-lg hover:bg-gray-400">
                        Reset
                    </button>
                </div>
            </div>

            <!-- Results Table -->
            <div class="bg-white rounded-lg shadow overflow-hidden">
                <div class="px-6 py-4 border-b">
                    <h3 class="text-lg font-medium text-gray-900">All Results</h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Student</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Course</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Lecturer</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Grade</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Score</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Session</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Date</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="results-table-body" class="bg-white divide-y divide-gray-200">
                            <!-- Results will be loaded here -->
                        </tbody>
                    </table>
                </div>
                
                <!-- Empty State -->
                <div id="empty-state" class="hidden text-center py-12">
                    <svg class="w-12 h-12 mx-auto text-gray-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                    </svg>
                    <p class="text-gray-500">No results found</p>
                </div>
            </div>

            <!-- Statistics -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mt-6">
                <div class="bg-white rounded-lg shadow p-6 card-hover">
                    <div class="flex items-center">
                        <div class="flex-shrink-0 bg-yellow-100 rounded-lg p-3">
                            <svg class="w-6 h-6 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                        </div>
                        <div class="ml-4">
                            <p class="text-sm font-medium text-gray-600">Pending</p>
                            <p class="text-2xl font-semibold text-gray-900" id="pending-count">0</p>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-lg shadow p-6 card-hover">
                    <div class="flex items-center">
                        <div class="flex-shrink-0 bg-green-100 rounded-lg p-3">
                            <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                        </div>
                        <div class="ml-4">
                            <p class="text-sm font-medium text-gray-600">Approved</p>
                            <p class="text-2xl font-semibold text-gray-900" id="approved-count">0</p>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-lg shadow p-6 card-hover">
                    <div class="flex items-center">
                        <div class="flex-shrink-0 bg-red-100 rounded-lg p-3">
                            <svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                            </svg>
                        </div>
                        <div class="ml-4">
                            <p class="text-sm font-medium text-gray-600">Rejected</p>
                            <p class="text-2xl font-semibold text-gray-900" id="rejected-count">0</p>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-lg shadow p-6 card-hover">
                    <div class="flex items-center">
                        <div class="flex-shrink-0 bg-blue-100 rounded-lg p-3">
                            <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                            </svg>
                        </div>
                        <div class="ml-4">
                            <p class="text-sm font-medium text-gray-600">Total</p>
                            <p class="text-2xl font-semibold text-gray-900" id="total-count">0</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Result Details Modal -->
    <div id="result-modal" class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50">
        <div class="relative top-20 mx-auto p-5 border w-11/12 max-w-4xl shadow-lg rounded-lg bg-white">
            <div class="mt-3">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-medium text-gray-900">Result Details</h3>
                    <button onclick="closeResultModal()" class="text-gray-400 hover:text-gray-500">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
                <div id="result-details-content">
                    <!-- Result details will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        // Check authentication
        document.addEventListener('DOMContentLoaded', () => {
            if (!auth.isAuthenticated()) {
                window.location.href = '../login.html';
                return;
            }

            if (!auth.hasRole('admin')) {
                auth.redirectByRole();
                return;
            }

            // Initialize results page
            initializeResults();
        });

        // Initialize results page
        async function initializeResults() {
            try {
                // Load user data
                const user = auth.getCurrentUser();
                updateUserProfile(user);

                // Load results data
                await loadResults();

                // Setup mobile menu
                setupMobileMenu();
            } catch (error) {
                console.error('Results initialization error:', error);
                toastManager.error('Failed to load results');
            }
        }

        // Update user profile
        function updateUserProfile(user) {
            const userName = user.name || user.email || 'Administrator';
            const initials = userName.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);

            document.getElementById('user-name').textContent = userName;
            document.getElementById('user-email').textContent = user.email;
            document.getElementById('user-initials').textContent = initials;
        }

        // Load results data
        async function loadResults() {
            try {
                showLoading();

                const resultsData = await api.get('/admin/results');
                
                // Update table
                updateResultsTable(resultsData);
                
                // Update statistics
                updateStatistics(resultsData);
                
                // Populate filters
                populateFilters(resultsData);

            } catch (error) {
                console.error('Error loading results:', error);
                toastManager.error('Failed to load results');
            } finally {
                hideLoading();
            }
        }

        // Update results table
        function updateResultsTable(results) {
            const tbody = document.getElementById('results-table-body');
            const emptyState = document.getElementById('empty-state');
            
            if (!results || results.length === 0) {
                tbody.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');
            
            tbody.innerHTML = results.map(result => `
                <tr>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="flex items-center">
                            <div class="flex-shrink-0 h-10 w-10">
                                <div class="h-10 w-10 rounded-full bg-gradient-to-r from-blue-500 to-purple-600 flex items-center justify-center">
                                    <span class="text-white text-sm font-medium">${getInitials(result.student_name)}</span>
                                </div>
                            </div>
                            <div class="ml-4">
                                <div class="text-sm font-medium text-gray-900">${result.student_name}</div>
                                <div class="text-sm text-gray-500">${result.student_matric}</div>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${result.course_code}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${result.lecturer_name}</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${getGradeColor(result.grade)}">
                            ${result.grade}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${result.score}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${result.session}</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${getStatusColor(result.status)}">
                            ${result.status}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${formatDate(result.created_at)}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                        <button onclick="viewResultDetails('${result.id}')" class="text-blue-600 hover:text-blue-900 mr-3">View</button>
                        ${result.status === 'pending' ? `
                            <button onclick="approveResult('${result.id}')" class="text-green-600 hover:text-green-900 mr-3">Approve</button>
                            <button onclick="rejectResult('${result.id}')" class="text-red-600 hover:text-red-900">Reject</button>
                        ` : ''}
                    </td>
                </tr>
            `).join('');
        }

        // Update statistics
        function updateStatistics(results) {
            if (!results || results.length === 0) {
                document.getElementById('pending-count').textContent = '0';
                document.getElementById('approved-count').textContent = '0';
                document.getElementById('rejected-count').textContent = '0';
                document.getElementById('total-count').textContent = '0';
                return;
            }

            const pending = results.filter(r => r.status === 'pending').length;
            const approved = results.filter(r => r.status === 'approved').length;
            const rejected = results.filter(r => r.status === 'rejected').length;

            document.getElementById('pending-count').textContent = pending;
            document.getElementById('approved-count').textContent = approved;
            document.getElementById('rejected-count').textContent = rejected;
            document.getElementById('total-count').textContent = results.length;
        }

        // Populate filters
        function populateFilters(results) {
            if (!results || results.length === 0) return;

            // Get unique courses
            const courses = [...new Set(results.map(r => r.course_code))].sort();
            const courseFilter = document.getElementById('course-filter');
            
            courseFilter.innerHTML = '<option value="">All Courses</option>' + 
                courses.map(c => `<option value="${c}">${c}</option>`).join('');

            // Get unique lecturers
            const lecturers = [...new Set(results.map(r => r.lecturer_name))].sort();
            const lecturerFilter = document.getElementById('lecturer-filter');
            
            lecturerFilter.innerHTML = '<option value="">All Lecturers</option>' + 
                lecturers.map(l => `<option value="${l}">${l}</option>`).join('');
        }

        // Get initials
        function getInitials(name) {
            return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
        }

        // Get grade color
        function getGradeColor(grade) {
            const colors = {
                'A': 'bg-green-100 text-green-800',
                'B': 'bg-blue-100 text-blue-800',
                'C': 'bg-yellow-100 text-yellow-800',
                'D': 'bg-orange-100 text-orange-800',
                'F': 'bg-red-100 text-red-800'
            };
            return colors[grade] || 'bg-gray-100 text-gray-800';
        }

        // Get status color
        function getStatusColor(status) {
            const colors = {
                'pending': 'bg-yellow-100 text-yellow-800',
                'approved': 'bg-green-100 text-green-800',
                'rejected': 'bg-red-100 text-red-800'
            };
            return colors[status] || 'bg-gray-100 text-gray-800';
        }

        // Apply filters
        function applyFilters() {
            const status = document.getElementById('status-filter').value;
            const course = document.getElementById('course-filter').value;
            const lecturer = document.getElementById('lecturer-filter').value;
            const date = document.getElementById('date-filter').value;
            
            loadFilteredResults(status, course, lecturer, date);
        }

        // Load filtered results
        async function loadFilteredResults(status, course, lecturer, date) {
            try {
                showLoading();
                
                const queryParams = new URLSearchParams();
                if (status) queryParams.append('status', status);
                if (course) queryParams.append('course', course);
                if (lecturer) queryParams.append('lecturer', lecturer);
                if (date) queryParams.append('date', date);
                
                const url = queryParams.toString() ? `/admin/results?${queryParams}` : '/admin/results';
                const resultsData = await api.get(url);
                
                updateResultsTable(resultsData);
                updateStatistics(resultsData);
                
            } catch (error) {
                console.error('Error loading filtered results:', error);
                toastManager.error('Failed to load filtered results');
            } finally {
                hideLoading();
            }
        }

        // Reset filters
        function resetFilters() {
            document.getElementById('status-filter').value = '';
            document.getElementById('course-filter').value = '';
            document.getElementById('lecturer-filter').value = '';
            document.getElementById('date-filter').value = '';
            
            loadResults();
        }

        // View result details
        async function viewResultDetails(resultId) {
            try {
                showLoading();
                
                const resultData = await api.get(`/admin/results/${resultId}`);
                
                // Update modal content
                const content = document.getElementById('result-details-content');
                content.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <h4 class="text-lg font-medium text-gray-900 mb-4">Student Information</h4>
                            <div class="space-y-2">
                                <div class="flex">
                                    <span class="w-32 text-sm font-medium text-gray-600">Name:</span>
                                    <span class="text-sm text-gray-900">${resultData.student_name}</span>
                                </div>
                                <div class="flex">
                                    <span class="w-32 text-sm font-medium text-gray-600">Matric Number:</span>
                                    <span class="text-sm text-gray-900">${resultData.student_matric}</span>
                                </div>
                                <div class="flex">
                                    <span class="w-32 text-sm font-medium text-gray-600">Email:</span>
                                    <span class="text-sm text-gray-900">${resultData.student_email}</span>
                                </div>
                            </div>
                        </div>
                        
                        <div>
                            <h4 class="text-lg font-medium text-gray-900 mb-4">Course Information</h4>
                            <div class="space-y-2">
                                <div class="flex">
                                    <span class="w-32 text-sm font-medium text-gray-600">Course Code:</span>
                                    <span class="text-sm text-gray-900">${resultData.course_code}</span>
                                </div>
                                <div class="flex">
                                    <span class="w-32 text-sm font-medium text-gray-600">Course Name:</span>
                                    <span class="text-sm text-gray-900">${resultData.course_name}</span>
                                </div>
                                <div class="flex">
                                    <span class="w-32 text-sm font-medium text-gray-600">Credits:</span>
                                    <span class="text-sm text-gray-900">${resultData.credits}</span>
                                </div>
                            </div>
                        </div>
                        
                        <div>
                            <h4 class="text-lg font-medium text-gray-900 mb-4">Result Details</h4>
                            <div class="space-y-2">
                                <div class="flex">
                                    <span class="w-32 text-sm font-medium text-gray-600">Grade:</span>
                                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${getGradeColor(resultData.grade)}">
                                        ${resultData.grade}
                                    </span>
                                </div>
                                <div class="flex">
                                    <span class="w-32 text-sm font-medium text-gray-600">Score:</span>
                                    <span class="text-sm text-gray-900">${resultData.score}</span>
                                </div>
                                <div class="flex">
                                    <span class="w-32 text-sm font-medium text-gray-600">Grade Points:</span>
                                    <span class="text-sm text-gray-900">${resultData.grade_points}</span>
                                </div>
                            </div>
                        </div>
                        
                        <div>
                            <h4 class="text-lg font-medium text-gray-900 mb-4">Submission Details</h4>
                            <div class="space-y-2">
                                <div class="flex">
                                    <span class="w-32 text-sm font-medium text-gray-600">Lecturer:</span>
                                    <span class="text-sm text-gray-900">${resultData.lecturer_name}</span>
                                </div>
                                <div class="flex">
                                    <span class="w-32 text-sm font-medium text-gray-600">Session:</span>
                                    <span class="text-sm text-gray-900">${resultData.session}</span>
                                </div>
                                <div class="flex">
                                    <span class="w-32 text-sm font-medium text-gray-600">Status:</span>
                                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${getStatusColor(resultData.status)}">
                                        ${resultData.status}
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    ${resultData.remarks ? `
                        <div class="mt-6">
                            <h4 class="text-lg font-medium text-gray-900 mb-4">Remarks</h4>
                            <p class="text-sm text-gray-600">${resultData.remarks}</p>
                        </div>
                    ` : ''}
                    
                    <div class="mt-6 flex justify-end space-x-3">
                        ${resultData.status === 'pending' ? `
                            <button onclick="approveResult('${resultData.id}')" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">
                                Approve
                            </button>
                            <button onclick="rejectResult('${resultData.id}')" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">
                                Reject
                            </button>
                        ` : ''}
                        <button onclick="closeResultModal()" class="px-4 py-2 bg-gray-300 text-gray-700 rounded-lg hover:bg-gray-400">
                            Close
                        </button>
                    </div>
                `;
                
                // Show modal
                document.getElementById('result-modal').classList.remove('hidden');
                
            } catch (error) {
                console.error('Error loading result details:', error);
                toastManager.error('Failed to load result details');
            } finally {
                hideLoading();
            }
        }

        // Close result modal
        function closeResultModal() {
            document.getElementById('result-modal').classList.add('hidden');
        }

        // Approve result
        async function approveResult(resultId) {
            try {
                showLoading();
                
                const result = await api.patch(`/admin/results/${resultId}/approve`);
                
                if (result) {
                    toastManager.success('Result approved successfully');
                    
                    // Close modal if open
                    closeResultModal();
                    
                    // Reload results
                    await loadResults();
                }

            } catch (error) {
                console.error('Error approving result:', error);
                toastManager.error('Failed to approve result');
            } finally {
                hideLoading();
            }
        }

        // Reject result
        async function rejectResult(resultId) {
            modalManager.confirm(
                'reject-result',
                'Reject Result',
                'Are you sure you want to reject this result? This action cannot be undone.',
                async () => {
                    try {
                        showLoading();
                        
                        const result = await api.patch(`/admin/results/${resultId}/reject`);
                        
                        if (result) {
                            toastManager.success('Result rejected successfully');
                            
                            // Close modal if open
                            closeResultModal();
                            
                            // Reload results
                            await loadResults();
                        }

                    } catch (error) {
                        console.error('Error rejecting result:', error);
                        toastManager.error('Failed to reject result');
                    } finally {
                        hideLoading();
                    }
                },
                () => {
                    // Cancelled
                }
            );
        }

        // Export results
        function exportResults() {
            toastManager.info('Export functionality will be implemented soon');
        }

        // Setup mobile menu
        function setupMobileMenu() {
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            
            menuToggle.addEventListener('click', () => {
                sidebar.classList.toggle('-translate-x-full');
            });
            
            // Close menu when clicking outside
            document.addEventListener('click', (e) => {
                if (!sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
                    sidebar.classList.add('-translate-x-full');
                }
            });
        }
    </script>
</body>
</html>
